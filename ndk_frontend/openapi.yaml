    get:
      operationId: initializeSdkClient
      summary: Initialize the SDK client
      tags:
        - SDK Setup
      security: []
      description: Setup reference (not a live endpoint). After installing an SDK and getting a token from `POST /auth/login`, initialize a client with that token — every other code sample assumes this `client`.
