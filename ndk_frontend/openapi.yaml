openapi: 3.0.0
info:
  title: NUST LMS API
  version: 1.0.0
  description: |+
    NUST Learning Management System API for developer integrations (Moodle AJAX wrapper).
    Authenticate with your NUST LMS credentials via `POST /auth/login` to receive a bearer token, then call any operation with `Authorization: Bearer <token>`. The NustDevKit gateway logs into the LMS on your behalf and manages the underlying session (cookie + sesskey) server-side, so you never handle the ephemeral sesskey.

    ## Getting Started with the SDKs

    1. **Get the SDK** for your language — download the zip, unzip it, and install it:
       - **TypeScript** — [download](./sdks/nust-lms-api-ts_generic_lib.zip), then run `npm install` in the unzipped folder, then add it to your project.
       - **Python** — [download](./sdks/nust-lms-api-python_generic_lib.zip), then run `pip install -r requirements.txt` in the unzipped folder.
       - **Java** — [download](./sdks/nust-lms-api-java_eclipse_jre_lib.zip), then build the JAR with Gradle and add it to your project.
       - **.NET (C#)** — [download](./sdks/nust-lms-api-cs_net_standard_lib.zip), then add a project reference to the `NustLmsApi.Standard` project.
       - **Go** — [download](./sdks/nust-lms-api-go_generic_lib.zip), then add a local `replace` for the folder in your `go.mod`, then run `go get`.
       - **PHP** — [download](./sdks/nust-lms-api-php_generic_lib_v2.zip), then run `composer install` in the unzipped folder.
       - **Ruby** — [download](./sdks/nust-lms-api-ruby_generic_lib.zip), then run `gem build nust_lms_api.gemspec && gem install nust_lms_api-1.0.0.gem`.
    2. **Get a bearer token** from `POST /auth/login` with your NUST LMS credentials.
    3. **Initialize a client** with that token — see the **SDK Setup** section for the
       per-language code. Every other sample assumes that `client`.

    _Each SDK's own README has fuller, IDE-specific setup if you want it._

  contact:
    name: NustDevKit Support
    url: https://github.com/hasaanhameed52/NustDevKit
servers:
  - url: http://127.0.0.1:8000
    description: NustDevKit Gateway (local development)
security:
  - BearerAuth: []
tags:
  - name: Authentication
    description: Exchange NUST LMS credentials for a gateway bearer token
  - name: Courses
    description: Course listing and enrollment operations
  - name: Calendar
    description: |
      Calendar operations. On NUST LMS, these "action events" are how deadlines are surfaced — assignment, lab, quiz, and other submission due dates each appear as a calendar event on the day the work must be submitted.
  - name: Users
    description: User profile and preferences operations
  - name: Notifications
    description: Notification retrieval operations
  - name: SDK Setup
    description: Install an SDK and initialize a client with your bearer token.
x-tagGroups:
  - name: Getting Started
    tags:
      - Authentication
      - SDK Setup
  - name: Academics
    tags:
      - Courses
      - Calendar
  - name: Profile & Messaging
    tags:
      - Users
      - Notifications
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Gateway-issued JWT. Obtain it from `POST /auth/login` using your NUST LMS credentials, then send it as `Authorization: Bearer <token>`. The gateway manages the underlying LMS session (cookie + sesskey) server-side, so the ephemeral sesskey never leaves the gateway.
  schemas:
    LoginRequest:
      type: object
      description: NUST LMS credentials used to obtain a gateway bearer token.
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: NUST LMS username.
          example: johndoe.bscs23seecs
        password:
          type: string
          format: password
          description: NUST LMS password.
    TokenResponse:
      type: object
      description: Bearer token issued by the gateway after a successful login.
      required:
        - access_token
        - token_type
      properties:
        access_token:
          type: string
          description: "JWT to send as `Authorization: Bearer <token>` on subsequent requests."
        token_type:
          type: string
          default: bearer
          example: bearer
    CalendarEventVisibility:
      type: integer
      description: Visibility flag for a calendar event. 1 means the event is visible; 0 means it is hidden.
    CourseTimelineClassification:
      type: string
      description: Timeline classification filter for enrolled courses.
      enum:
        - all
        - inprogress
        - past
        - future
        - favourites
        - hidden
        - allincludinghidden
    CourseTimelineSortField:
      type: string
      description: Field used to sort enrolled course results.
      enum:
        - fullname
        - shortname
        - id
        - idnumber
        - timeaccess
    UserProfileField:
      type: string
      description: User profile field to match against when searching for users.
      enum:
        - id
        - idnumber
        - username
        - email
    MoodleWarning:
      x-scalar-ignore: true
      type: object
      description: A non-fatal warning returned alongside a successful response.
      properties:
        item:
          type: string
          description: Item identifier related to the warning; empty string if not applicable.
          example: ""
        itemid:
          type: integer
          description: Numeric item ID related to the warning; 0 if not applicable.
          example: 0
        warningcode:
          type: string
          description: Machine-readable warning code; empty string if no code.
          example: ""
        message:
          type: string
          description: Human-readable warning description.
          example: ""
    SiteNotification:
      type: object
      description: A site-level notification (structure varies by type).
      properties:
        id:
          type: integer
          description: Unique identifier for the site notification.
        message:
          type: string
          description: Notification message content.
        type:
          type: string
          description: Notification type identifier.
    MoodleError:
      x-scalar-ignore: true
      type: object
      description: Error returned by the LMS on a failed operation.
      properties:
        errorcode:
          type: string
          description: Machine-readable error code identifier.
          example: invalidrecord
        message:
          type: string
          description: Human-readable error description.
          example: Can't find data record in database table.
        link:
          type: string
          description: Redirect URL for the user; empty string if not applicable.
          example: ""
        moreinfourl:
          type: string
          description: URL to additional error documentation; empty string if not available.
          example: ""
        debuginfo:
          type: string
          description: Additional debug information; empty string when not in debug mode.
          example: ""
    Course:
      type: object
      description: An enrolled course.
      required:
        - id
        - fullname
        - shortname
        - idnumber
        - summary
        - summaryformat
        - startdate
        - enddate
        - visible
        - fullnamedisplay
        - viewurl
        - progress
        - hasprogress
        - isfavourite
        - hidden
        - showshortname
        - coursecategory
      properties:
        id:
          type: integer
          description: Unique course identifier.
          example: 49900
        fullname:
          type: string
          description: Full display name of the course.
          example: CS-212 Object Oriented Programming BSCS-13 2K23 ABC
        shortname:
          type: string
          description: Short course code or abbreviated name.
          example: CS-212-Sp'24 BSCS-13 2K23 ABC
        idnumber:
          type: string
          description: Institution-assigned course ID number; empty string if not set.
          example: ""
        summary:
          type: string
          description: HTML summary of the course.
          example: ""
        summaryformat:
          type: integer
          description: Format of the summary field (1 = HTML).
          example: 1
        startdate:
          type: integer
          description: Course start date as Unix timestamp.
          example: 1706468400
        enddate:
          type: integer
          description: Course end date as Unix timestamp. 0 means no end date.
          example: 1717362000
        visible:
          type: boolean
          description: Whether the course is visible to enrolled students.
          example: true
        fullnamedisplay:
          type: string
          description: Display name of the course (may differ from fullname for context).
          example: CS-212 Object Oriented Programming BSCS-13 2K23 ABC
        viewurl:
          type: string
          format: uri
          description: URL to the course page on the LMS portal.
          example: https://lms.nust.edu.pk/portal/course/view.php?id=49900
        progress:
          type: integer
          minimum: 0
          maximum: 100
          description: Student's completion progress as a percentage.
          example: 21
        hasprogress:
          type: boolean
          description: Whether completion tracking is enabled for this course.
          example: true
        isfavourite:
          type: boolean
          description: Whether the user has marked this course as a favourite.
          example: false
        hidden:
          type: boolean
          description: Whether the user has hidden this course from their dashboard.
          example: false
        showshortname:
          type: boolean
          description: Whether the short name is displayed alongside the full name.
          example: false
        coursecategory:
          type: string
          description: Name of the category this course belongs to.
          example: 2nd Semester (SP-2024)
    RecentCourseFields:
      type: object
      description: Additional fields specific to recently accessed courses.
      required:
        - timeaccess
      properties:
        timeaccess:
          type: integer
          description: Unix timestamp of the user's most recent access to this course.
          example: 1781632422
    RecentCourse:
      description: A recently accessed course, extending Course with the last-access timestamp.
      allOf:
        - $ref: "#/components/schemas/Course"
        - $ref: "#/components/schemas/RecentCourseFields"
    EnrolledCoursesResponse:
      type: object
      description: Paginated enrolled-courses response.
      required:
        - courses
        - nextoffset
      properties:
        courses:
          type: array
          description: List of enrolled courses for the current page.
          items:
            $ref: "#/components/schemas/Course"
        nextoffset:
          type: integer
          description: Offset to pass on the next page request; -1 when no further pages exist.
          example: 29
    EventIcon:
      type: object
      description: Icon metadata for a calendar event.
      required:
        - key
        - component
        - alttext
      properties:
        key:
          type: string
          description: Icon key name used to locate the icon asset.
          example: icon
        component:
          type: string
          description: Moodle component that owns the icon (e.g., 'assign').
          example: assign
        alttext:
          type: string
          description: Accessible alt text for the icon image.
          example: Activity event
    EventSubscription:
      type: object
      description: Subscription display settings for a calendar event.
      required:
        - displayeventsource
      properties:
        displayeventsource:
          type: boolean
          description: Whether to display the event source label on the calendar.
          example: false
    EventAction:
      type: object
      description: Primary action button metadata for a calendar event.
      required:
        - name
        - url
        - itemcount
        - actionable
        - showitemcount
      properties:
        name:
          type: string
          description: Display label for the primary action button.
          example: Add submission
        url:
          type: string
          format: uri
          description: URL the user should navigate to in order to perform the action.
          example: https://lms.nust.edu.pk/portal/mod/assign/view.php?id=999404&action=editsubmission
        itemcount:
          type: integer
          description: Number of items associated with this action.
          example: 1
        actionable:
          type: boolean
          description: Whether the action can currently be taken by the user.
          example: true
        showitemcount:
          type: boolean
          description: Whether to display the item count alongside the action label.
          example: false
    CalendarEvent:
      type: object
      description: |
        A calendar action event. On NUST LMS these represent deadlines — the due date for an assignment, lab, quiz, or other submission tied to a course activity.
      required:
        - id
        - name
        - description
        - descriptionformat
        - location
        - component
        - modulename
        - instance
        - eventtype
        - timestart
        - timeduration
        - timesort
        - visible
        - timemodified
        - icon
        - course
        - subscription
        - canedit
        - candelete
        - deleteurl
        - editurl
        - viewurl
        - formattedtime
        - isactionevent
        - iscourseevent
        - iscategoryevent
        - normalisedeventtype
        - normalisedeventtypetext
        - url
      properties:
        id:
          type: integer
          description: Unique calendar event identifier.
          example: 149885
        name:
          type: string
          description: Display name of the calendar event.
          example: Lab 1 BSCS 13C is due
        description:
          type: string
          description: HTML description body of the event.
          example: <p dir="ltr">Lab 1 BSCS 13C<br /></p>
        descriptionformat:
          type: integer
          description: Text format of the description (1 = HTML).
          example: 1
        location:
          type: string
          description: Physical or virtual location of the event; empty string if not specified.
          example: ""
        categoryid:
          type: integer
          nullable: true
          description: Course category ID; null if not a category event.
          example: null
        groupid:
          type: integer
          nullable: true
          description: Group ID if the event is group-specific; null otherwise.
          example: null
        userid:
          type: integer
          nullable: true
          description: User ID if the event is user-specific; null otherwise.
          example: null
        repeatid:
          type: integer
          nullable: true
          description: ID of the repeat group for recurring events; null if not recurring.
          example: null
        eventcount:
          type: integer
          nullable: true
          description: Total number of events in the repeat group; null if not applicable.
          example: null
        component:
          type: string
          description: Moodle component that created the event (e.g., 'mod_assign').
          example: mod_assign
        modulename:
          type: string
          description: Short name of the Moodle activity module (e.g., 'assign').
          example: assign
        instance:
          type: integer
          description: The course module instance ID.
          example: 999404
        eventtype:
          type: string
          description: Type of the event (e.g., 'due', 'open', 'close').
          example: due
        timestart:
          type: integer
          description: Event start time as Unix timestamp.
          example: 1706900340
        timeduration:
          type: integer
          description: Duration in seconds; 0 for point-in-time events.
          example: 0
        timesort:
          type: integer
          description: Sort timestamp used for ordering events.
          example: 1706900340
        visible:
          $ref: "#/components/schemas/CalendarEventVisibility"
        timemodified:
          type: integer
          description: Last modification time as Unix timestamp.
          example: 1779088440
        icon:
          $ref: "#/components/schemas/EventIcon"
        course:
          $ref: "#/components/schemas/Course"
        subscription:
          $ref: "#/components/schemas/EventSubscription"
        canedit:
          type: boolean
          description: Whether the current user can edit this event.
          example: false
        candelete:
          type: boolean
          description: Whether the current user can delete this event.
          example: false
        deleteurl:
          type: string
          format: uri
          description: URL to delete this calendar event.
          example: https://lms.nust.edu.pk/portal/calendar/delete.php?id=149885&course=49900
        editurl:
          type: string
          format: uri
          description: URL to edit the underlying course module associated with this event.
          example: https://lms.nust.edu.pk/portal/course/mod.php?update=999404&return=1&sesskey=XXXX
        viewurl:
          type: string
          format: uri
          description: URL to view this event on the calendar.
          example: https://lms.nust.edu.pk/portal/calendar/view.php?view=day&course=49900&time=1706900340
        formattedtime:
          type: string
          description: HTML-formatted human-readable event time string.
          example: <span class="dimmed_text">Friday, 2 February, 11:59 PM</span>
        isactionevent:
          type: boolean
          description: Whether this is an action event requiring user interaction.
          example: true
        iscourseevent:
          type: boolean
          description: Whether this event is associated with a specific course.
          example: false
        iscategoryevent:
          type: boolean
          description: Whether this event is associated with a course category.
          example: false
        groupname:
          type: string
          nullable: true
          description: Name of the group for group-specific events; null otherwise.
          example: null
        normalisedeventtype:
          type: string
          description: Normalised event type identifier used for display grouping.
          example: course
        normalisedeventtypetext:
          type: string
          description: Human-readable label for the normalised event type.
          example: Course event
        action:
          $ref: "#/components/schemas/EventAction"
        url:
          type: string
          format: uri
          description: Direct URL to the course activity associated with this event.
          example: https://lms.nust.edu.pk/portal/mod/assign/view.php?id=999404
    CalendarEventsResponse:
      type: object
      description: A list of calendar events with pagination boundary IDs.
      required:
        - events
        - firstid
        - lastid
      properties:
        events:
          type: array
          description: List of calendar action events for the current result set.
          items:
            $ref: "#/components/schemas/CalendarEvent"
        firstid:
          type: integer
          description: Event ID of the first item in the result set.
          example: 149885
        lastid:
          type: integer
          description: Event ID of the last item in the result set.
          example: 151886
    CustomField:
      type: object
      description: A custom profile field value attached to a user.
      required:
        - type
        - value
        - name
        - shortname
      properties:
        type:
          type: string
          description: Data type of the custom field (e.g., 'text', 'select').
          example: text
        value:
          type: string
          description: Value stored in the custom field.
          example: SEECS
        name:
          type: string
          description: Display label of the custom field.
          example: Institute
        shortname:
          type: string
          description: Machine-readable shortname identifier for the custom field.
          example: institution
    UserPreference:
      type: object
      description: A single user preference setting.
      required:
        - name
        - value
      properties:
        name:
          type: string
          description: Unique key identifying the preference.
          example: block_myoverview_user_sort_preference
        value:
          type: string
          description: |
            Preference value as a string. Note that the internal _lastloaded preference is returned as an integer by the LMS.
          example: title
    UserProfile:
      type: object
      description: Complete user profile.
      required:
        - id
        - username
        - fullname
        - email
        - department
        - institution
        - idnumber
        - auth
        - confirmed
        - lang
        - theme
        - timezone
        - mailformat
        - profileimageurlsmall
        - profileimageurl
      properties:
        id:
          type: integer
          description: Unique numeric user identifier.
          example: 123456
        username:
          type: string
          description: Login username for the user.
          example: johndoe.bscs23seecs
        fullname:
          type: string
          description: Full display name of the user.
          example: John Doe
        email:
          type: string
          format: email
          description: Email address of the user.
          example: johndoe.bscs23seecs@seecs.edu.pk
        department:
          type: string
          description: Department the user belongs to within the institution.
          example: FoC
        institution:
          type: string
          description: Name of the institution the user is affiliated with.
          example: SEECS
        idnumber:
          type: string
          description: Institution-assigned student or staff ID number.
          example: "00000454987"
        auth:
          type: string
          description: Authentication method used by the user (e.g., 'ldap', 'manual').
          example: ldap
        confirmed:
          type: boolean
          description: Whether the user's account has been confirmed.
          example: true
        lang:
          type: string
          description: Preferred interface language code (e.g., 'en').
          example: en
        theme:
          type: string
          description: Preferred LMS theme; empty string means use the site default.
          example: ""
        timezone:
          type: string
          description: Timezone identifier. "99" means use the server default.
          example: "99"
        mailformat:
          type: integer
          description: Email format preference (1 = HTML).
          example: 1
        profileimageurlsmall:
          type: string
          format: uri
          description: URL to the user's small profile image (thumbnail).
          example: https://lms.nust.edu.pk/portal/pluginfile.php/1583361/user/icon/moove/f2?rev=14452894
        profileimageurl:
          type: string
          format: uri
          description: URL to the user's full-size profile image.
          example: https://lms.nust.edu.pk/portal/pluginfile.php/1583361/user/icon/moove/f1?rev=14452894
        customfields:
          type: array
          description: List of custom profile field values for the user.
          items:
            $ref: "#/components/schemas/CustomField"
        preferences:
          type: array
          description: List of stored preference key/value pairs for the user.
          items:
            $ref: "#/components/schemas/UserPreference"
    UserPreferencesResponse:
      type: object
      description: Response envelope for the user-preferences endpoint.
      required:
        - preferences
        - warnings
      properties:
        preferences:
          type: array
          description: List of user preference key/value pairs.
          items:
            $ref: "#/components/schemas/UserPreference"
        warnings:
          type: array
          description: Array of warning objects. Empty when no warnings are present.
          items:
            $ref: "#/components/schemas/MoodleWarning"
    Notification:
      type: object
      description: A popup notification message delivered to a user.
      required:
        - id
        - useridfrom
        - useridto
        - subject
        - shortenedsubject
        - text
        - fullmessage
        - fullmessageformat
        - fullmessagehtml
        - smallmessage
        - contexturl
        - contexturlname
        - timecreated
        - timecreatedpretty
        - read
        - deleted
        - iconurl
        - component
        - eventtype
        - customdata
      properties:
        id:
          type: integer
          description: Unique notification identifier.
          example: 4857819
        useridfrom:
          type: integer
          description: User ID of the sender.
          example: 234567
        useridto:
          type: integer
          description: User ID of the recipient.
          example: 123456
        subject:
          type: string
          description: Subject line of the notification.
          example: "CS-101 Introduction to Computing: Lab 3 Submission Deadline"
        shortenedsubject:
          type: string
          description: Shortened version of the notification subject for compact display.
          example: "CS-101 Introduction to Computing: Lab 3 Submission Deadline"
        text:
          type: string
          description: Short HTML excerpt of the notification.
          example: <p>John Doe posted in CS-101 Introduction to Computing...</p>
        fullmessage:
          type: string
          description: Full plain-text body of the notification.
        fullmessageformat:
          type: integer
          description: Format identifier for fullmessagehtml (2 = Markdown source).
          example: 2
        fullmessagehtml:
          type: string
          description: Full HTML body of the notification email.
        smallmessage:
          type: string
          description: Short plain-text preview of the notification.
          example: John Doe posted in CS-101 Introduction to Computing...
        contexturl:
          type: string
          format: uri
          description: URL to the relevant context for this notification (e.g., a forum post).
          example: https://lms.nust.edu.pk/portal/mod/forum/discuss.php?d=41767#p52342
        contexturlname:
          type: string
          description: Human-readable label for the context URL link.
          example: Lab Sessional Finalization - (DL - Section D & E)
        timecreated:
          type: integer
          description: Unix timestamp when the notification was created.
          example: 1780045085
        timecreatedpretty:
          type: string
          description: Human-readable relative time string (e.g., '19 days ago').
          example: 19 days ago
        timeread:
          type: integer
          nullable: true
          description: Unix timestamp when the notification was read; null if unread.
          example: null
        read:
          type: boolean
          description: Whether the notification has been read by the recipient.
          example: false
        deleted:
          type: boolean
          description: Whether the notification has been deleted by the recipient.
          example: false
        iconurl:
          type: string
          format: uri
          description: URL to the icon image representing the notification source.
          example: https://lms.nust.edu.pk/portal/theme/image.php/moove/mod_forum/1778048051/icon
        component:
          type: string
          description: Moodle component that generated the notification (e.g., 'mod_forum').
          example: mod_forum
        eventtype:
          type: string
          description: Event type within the component that triggered the notification (e.g., 'posts').
          example: posts
        customdata:
          type: string
          description: |
            JSON-encoded string with additional notification metadata (cmid, instance, discussionid, postid, etc.).
          example: '{"cmid":"1272420","instance":"62569","discussionid":"41767"}'
    PopupNotificationsResponse:
      type: object
      description: Response envelope for the popup-notifications endpoint.
      required:
        - notifications
        - unreadcount
      properties:
        notifications:
          type: array
          description: List of popup notifications for the user.
          items:
            $ref: "#/components/schemas/Notification"
        unreadcount:
          type: integer
          description: Total number of unread notifications for the user.
          example: 1
    GetRecentCoursesRequest:
      x-scalar-ignore: true
      type: object
      description: Request parameters for retrieving recently accessed courses.
      required:
        - limit
      properties:
        limit:
          type: integer
          description: Maximum number of courses to return.
          default: 10
          example: 10
    GetEnrolledCoursesByTimelineRequest:
      x-scalar-ignore: true
      type: object
      description: Request parameters for retrieving enrolled courses filtered by timeline classification.
      required:
        - offset
        - limit
        - classification
        - sort
      properties:
        offset:
          type: integer
          description: Zero-based pagination offset.
          default: 0
          example: 0
        limit:
          type: integer
          description: Maximum number of courses to return.
          default: 50
          example: 50
        classification:
          $ref: "#/components/schemas/CourseTimelineClassification"
        sort:
          $ref: "#/components/schemas/CourseTimelineSortField"
    FetchNotificationsRequest:
      x-scalar-ignore: true
      type: object
      description: Request parameters for fetching site-level notifications.
      required:
        - contextid
      properties:
        contextid:
          type: integer
          description: |
            Moodle context ID for which to fetch notifications. The user context ID can be found in the user profile image URL path segment.
          example: 1583361
    GetCalendarEventsByTimesortRequest:
      x-scalar-ignore: true
      type: object
      description: Request parameters for retrieving calendar action events sorted by time.
      required:
        - limitnum
        - timesortfrom
      properties:
        limitnum:
          type: integer
          description: Maximum number of events to return.
          example: 20
        timesortfrom:
          type: integer
          description: |
            Only return events with timesort >= this Unix timestamp. Pass 0 for no lower bound.
          example: 0
        timesortto:
          type: integer
          description: Only return events with timesort <= this Unix timestamp. Optional.
        aftereventid:
          type: integer
          description: Return events whose ID is greater than this value (cursor pagination). Optional.
    GetCalendarEventsByCourseRequest:
      x-scalar-ignore: true
      type: object
      description: Request parameters for retrieving calendar action events for a specific course.
      required:
        - courseid
      properties:
        courseid:
          type: integer
          description: ID of the course to fetch events for.
          example: 49906
        timesortfrom:
          type: integer
          description: Only return events with timesort >= this Unix timestamp. Optional.
        timesortto:
          type: integer
          description: Only return events with timesort <= this Unix timestamp. Optional.
        aftereventid:
          type: integer
          description: Cursor-based pagination — return events after this event ID. Optional.
        limitnum:
          type: integer
          description: Maximum number of events to return. Optional.
    GetUsersByFieldRequest:
      x-scalar-ignore: true
      type: object
      description: Request parameters for retrieving user profiles by a profile field value.
      required:
        - field
        - values
      properties:
        field:
          $ref: "#/components/schemas/UserProfileField"
        values:
          type: array
          description: |
            List of field values to look up. All values must be provided as strings even when the field is numeric (e.g., "123456" for an integer ID).
          items:
            type: string
            description: A single field value to match against, always provided as a string.
          example:
            - "123456"
    GetUserPreferencesRequest:
      x-scalar-ignore: true
      type: object
      description: Request parameters for retrieving user preferences.
      required:
        - userid
      properties:
        userid:
          type: integer
          description: ID of the user whose preferences to retrieve.
          example: 123456
        name:
          type: string
          description: Specific preference name to retrieve. Omit to retrieve all preferences.
    GetPopupNotificationsRequest:
      x-scalar-ignore: true
      type: object
      description: Request parameters for retrieving popup notifications for a user.
      required:
        - useridto
        - limit
        - offset
      properties:
        useridto:
          type: string
          description: ID of the recipient user, passed as a string.
          example: "123456"
        limit:
          type: integer
          description: Maximum number of notifications to return.
          example: 20
        offset:
          type: integer
          description: Pagination offset.
          default: 0
          example: 0
