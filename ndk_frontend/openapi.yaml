          label: TypeScript
          source: |-
            import { Client } from 'nust-lms-apilib';

            const client = new Client({
              bearerAuthCredentials: {
                accessToken: 'YOUR_BEARER_TOKEN'
              },
            });
        - lang: python
          label: Python
          source: |-
            from nustlmsapi.http.auth.oauth_2 import BearerAuthCredentials
            from nustlmsapi.nustlmsapi_client import NustlmsapiClient

            client = NustlmsapiClient(
                bearer_auth_credentials=BearerAuthCredentials(
                    access_token='YOUR_BEARER_TOKEN'
                )
            )
        - lang: java
          label: Java
          source: |-
            import com.nustdevkit.api.NustLmsApiClient;
            import com.nustdevkit.api.authentication.BearerAuthModel;

            public class Program {
                public static void main(String[] args) {
                    NustLmsApiClient client = new NustLmsApiClient.Builder()
                        .bearerAuthCredentials(new BearerAuthModel.Builder(
                                "YOUR_BEARER_TOKEN"
                            )
                            .build())
                        .build();
                }
            }
        - lang: csharp
          label: .NET (C#)
          source: |-
            using NustLmsApi.Standard;
            using NustLmsApi.Standard.Authentication;

            namespace ConsoleApp;

            NustLmsApiClient client = new NustLmsApiClient.Builder()
                .BearerAuthCredentials(
                    new BearerAuthModel.Builder(
                        "YOUR_BEARER_TOKEN"
                    )
                    .Build())
                .Build();
        - lang: go
          label: Go
          source: |-
            package main

            import (
                "nustLmsApi"
            )

            func main() {
                client := nustLmsApi.NewClient(
                nustLmsApi.CreateConfiguration(
                        nustLmsApi.WithBearerAuthCredentials(
                            nustLmsApi.NewBearerAuthCredentials("YOUR_BEARER_TOKEN"),
                        ),
                    ),
                )
            }
        - lang: php
          label: PHP
          source: |-
            use NustLmsApiLib\Authentication\BearerAuthCredentialsBuilder;
            use NustLmsApiLib\NustLmsApiClientBuilder;

            $client = NustLmsApiClientBuilder::init()
                ->bearerAuthCredentials(
                    BearerAuthCredentialsBuilder::init(
                        'YOUR_BEARER_TOKEN'
                    )
                )
                ->build();
