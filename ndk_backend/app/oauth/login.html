<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in — NustDevKit</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f6ff;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
      color: #042c53;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(4, 44, 83, 0.10);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 400px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-row span {
      font-size: 1.25rem;
      font-weight: 700;
      color: #378add;
      letter-spacing: -0.3px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #5a7a9a;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: #042c53;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #c8d8eb;
      border-radius: 7px;
      font-size: 0.9375rem;
      color: #042c53;
      background: #f8fbff;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 18px;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #378add;
      background: #fff;
    }

    button[type="submit"] {
      width: 100%;
      padding: 11px;
      background: #378add;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }

    button[type="submit"]:hover { background: #2b6fb5; }
    button[type="submit"]:active { background: #245e9a; }

    .error {
      background: #fff0f0;
      border: 1px solid #f5b8b8;
      border-radius: 7px;
      padding: 10px 14px;
      font-size: 0.875rem;
      color: #c0392b;
      margin-bottom: 18px;
    }

    .footer {
      margin-top: 24px;
      font-size: 0.8rem;
      color: #8aaac4;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <span>NustDevKit</span>
    </div>
    <h1>Sign in with NUST LMS</h1>
    <p class="subtitle">Authorize an AI assistant to access your LMS data on your behalf.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <input type="hidden" name="client_id" value="{{ client_id }}" />
      <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}" />
      <input type="hidden" name="code_challenge" value="{{ code_challenge }}" />
      <input type="hidden" name="code_challenge_method" value="{{ code_challenge_method }}" />
      <input type="hidden" name="state" value="{{ state }}" />

      <label for="username">NUST Username</label>
      <input type="text" id="username" name="username" placeholder="e.g. johndoe.bscs23seecs" autocomplete="username" required />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required />

      <button type="submit">Authorize</button>
    </form>

    <p class="footer">Your credentials are used once to authenticate and are never stored.</p>
  </div>
</body>
</html>
