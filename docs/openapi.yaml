  /auth/login:
    post:
      operationId: login
      summary: Log in with NUST LMS credentials
      description: |
        Authenticates against NUST LMS on your behalf and returns a gateway JWT. The LMS session (cookie + sesskey) is created and held server-side; use the returned token as `Authorization: Bearer <token>` for every other operation.
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        description: NUST LMS credentials.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication succeeded; bearer token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid LMS credentials.
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Invalid LMS credentials.
      x-codeSamples:
        - lang: typescript
          label: TypeScript
          source: |-
            const body: LoginRequest = {
              email: 'john.doe@student.nust.edu.pk',
              password: 'password0',
            };

            try {
              const response = await authenticationApi.login(body);

              // Extracting fully parsed response body.
              console.log(response.result);

              // Extracting response status code.
              console.log(response.statusCode);
              // Extracting response headers.
              console.log(response.headers);
              // Extracting response body of type `string | Stream`
              console.log(response.body);
            } catch (error) {
              if (error instanceof ApiError) {
                // Extracting response error status code.
                console.log(error.statusCode);
                // Extracting response error headers.
                console.log(error.headers);
                // Extracting response error body of type `string | Stream`.
                console.log(error.body);
                if (error instanceof AuthLogin401Error) {
                  console.log(error.result);
                }
              }
            }
        - lang: python
          label: Python
          source: |-
            body = LoginRequest(
                email='john.doe@student.nust.edu.pk',
                password='password0'
            )

            result = authentication_api.login(body)

            if result.is_success():
                print(result.body)
            elif result.is_error():
                print(result.errors)
        - lang: java
          label: Java
