            }
            catch (ApiException e)
            {
                Console.WriteLine(e.Message);
                if (e is AuthLogin401ErrorException)
                {
                   // TODO: Handle AuthLogin401ErrorException exception here
                }
            }
        - lang: go
          label: Go
          source: |-
            ctx := context.Background()

            body := models.LoginRequest{
                Email:                 "john.doe@student.nust.edu.pk",
                Password:              "password0",
            }

            apiResponse, err := authenticationApi.Login(ctx, body)
            if err != nil {
                switch typedErr := err.(type) {
                    case *errors.AuthLogin401Error:
                        log.Fatalln("AuthLogin401ErrorException: ", typedErr)
                    default:
                        log.Fatalln(err)
                }
            } else {
                // Printing the result and response
                fmt.Println(apiResponse.Data)
                fmt.Println(apiResponse.Response.StatusCode)
            }
