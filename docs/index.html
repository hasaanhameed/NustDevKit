<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NUST LMS Developer Hub</title>
    <meta
      name="description"
      content="NUST LMS Developer Hub: a developer-friendly REST API and SDKs for the NUST Learning Management System."
    />
    <link rel="shortcut icon" href="./favicon.ico" />
    <style>
      :root {
        /* NUST brand palette — owned by us, not the docs engine */
        --nust-navy: #042c53; /* midnight navy: header, footer, nav backgrounds */
        --nust-blue: #378add; /* primary blue: buttons, links, accents */
        --nust-sky: #e6f1fb; /* pale sky: section backgrounds, cards, hover */
        --nust-header-h: 72px;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
      }

      /* ---- Our custom header: this is the frontend we now fully control ---- */
      .ndk-header {
        height: var(--nust-header-h);
        box-sizing: border-box;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 0 22px;
        background: #fff;
        color: var(--nust-navy);
        border-bottom: 1px solid #d6e4f3;
        /* Fixed so it stays pinned while the Scalar panel scrolls underneath. */
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
      }

      .ndk-header img.logo {
        height: 48px;
        width: auto;
        display: block;
      }

      .ndk-brand {
        display: flex;
        align-items: center;
        line-height: 1.15;
      }

      .ndk-brand .title {
        font-weight: 700;
        font-size: 18px;
        letter-spacing: 0.2px;
      }

      .ndk-divider {
        width: 1px;
        height: 34px;
        background: #d6e4f3;
      }

      .ndk-spacer {
        flex: 1 1 auto;
      }

      .ndk-header a.ndk-link {
        display: inline-flex;
        align-items: center;
        color: var(--nust-navy);
        text-decoration: none;
        padding: 8px;
        border-radius: 6px;
        transition: background 0.15s ease;
      }

      .ndk-header a.ndk-link:hover {
        background: var(--nust-sky);
      }

      .ndk-header a.ndk-link svg {
        width: 24px;
        height: 24px;
        fill: currentColor;
        display: block;
      }

      /* Labelled button (Download OpenAPI) */
      .ndk-header a.ndk-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        color: var(--nust-navy);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        padding: 7px 12px;
        border-radius: 6px;
        border: 1px solid #d6e4f3;
        transition: background 0.15s ease;
      }

      .ndk-header a.ndk-btn:hover {
        background: var(--nust-sky);
      }

      .ndk-header a.ndk-btn svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
        display: block;
      }

      /* ---- Scalar fills the full viewport; it reserves space for our fixed
         header itself via --scalar-custom-header-height (set below), which also
         makes its sidebar stick correctly below the header. ---- */
      #app {
        height: 100vh;
        /* Tell Scalar's layout how tall our fixed header is so it offsets content
           and pins the sidebar at top: var(--scalar-custom-header-height). */
        --scalar-custom-header-height: var(--nust-header-h);
      }
    </style>
  </head>

  <body>
    <header class="ndk-header">
      <img class="logo" src="./nust-logo.png" alt="NUST" />
      <div class="ndk-divider"></div>
      <div class="ndk-brand">
        <span class="title">NUST LMS Developer Hub</span>
      </div>
      <div class="ndk-spacer"></div>
      <a
        class="ndk-btn"
        href="./openapi.yaml"
        download="nust-lms-openapi.yaml"
        aria-label="Download the OpenAPI document"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 16l-5-5h3V4h4v7h3l-5 5zm-7 2h14v2H5z" />
        </svg>
        Download OpenAPI
      </a>
      <a
        class="ndk-link"
        href="https://github.com/hasaanhameed52/NustDevKit"
        target="_blank"
        rel="noopener"
        aria-label="GitHub repository"
      >
        <svg viewBox="0 0 16 16" aria-hidden="true">
          <path
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
          />
        </svg>
      </a>
    </header>

    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script>
      Scalar.createApiReference("#app", {
        url: "./openapi.yaml",
        theme: "none", // disable Scalar's built-in theme so our NUST CSS wins
        layout: "modern",
        favicon: "./favicon.ico",
        // Single blue/white theme — no dark mode.
        darkMode: false,
        forceDarkModeState: "light",
        hideDarkModeToggle: true,
        // We expose our own "Download OpenAPI" button in the header instead.
        hideDownloadButton: true,
        // Remove the "Open API Client" button (keep the inline Test Request).
        hideClientButton: true,
        // The real SDK examples come from x-codeSamples (injected from APIMatic's
        // generated SDKs) and render in their own "Code Examples" panel. Hide ALL of
        // Scalar's auto-generated snippet clients so the noisy invented languages
        // (JavaScript/Rust/Dart/etc.) don't appear alongside them.
        hiddenClients: true,
        metaData: {
          title: "NUST LMS Developer Hub",
        },
        // NUST single light theme. Scalar exposes its theme via CSS variables —
        // exactly the control surface the APIMatic widget hid from us.
        customCss: `
          :root {
            /* Force the light palette only; we never expose a dark variant. */
            --scalar-color-accent: #378add;
            --scalar-color-1: #042c53;
            --scalar-color-2: #2a4a6b;
            --scalar-color-3: #5a7798;
            --scalar-background-1: #ffffff;
            /* Section panels (Server, Authentication, Operations, schema accordions)
               read from background-2/3 — a clearer light blue gives the app the blue
               presence it was missing. */
            --scalar-background-2: #dbeafe;
            --scalar-background-3: #cfe3fb;
            --scalar-background-accent: #dbeafe;
            --scalar-border-color: #c4dcf3;

            --scalar-button-1: #042c53;
            --scalar-link-color: #378add;

            /* White sidebar (the "navbar") with pale-sky hover/active. */
            --scalar-sidebar-background-1: #ffffff;
            --scalar-sidebar-color-1: #042c53;
            --scalar-sidebar-color-2: #5a7798;
            --scalar-sidebar-border-color: #d6e4f3;
            --scalar-sidebar-item-hover-background: #e6f1fb;
            --scalar-sidebar-item-hover-color: #042c53;
            --scalar-sidebar-item-active-background: #e6f1fb;
            --scalar-sidebar-color-active: #378add;
            --scalar-sidebar-search-background: #f5f9fd;
            --scalar-sidebar-search-border-color: #d6e4f3;
          }

          /* Make section header bars read as distinctly blue (a touch stronger
             than the panel body) — Server / Authentication / Operations etc. */
          .section-accordion-button,
          .endpoints {
            background: #cfe3fb;
          }

          /* The auth credential field (Bearer Token) is easy to miss as editable.
             Give it a clear input affordance: white field, blue border, padding. */
          [class*="security-scheme"] input,
          [class*="scheme-card"] input,
          .scalar-card-form input {
            border: 1px solid #378add !important;
            background: #ffffff !important;
            border-radius: 6px !important;
            padding: 6px 10px !important;
            min-width: 240px;
          }
          [class*="security-scheme"] input::placeholder {
            color: #7aa0c4;
          }

          /* Remove Scalar branding and the document version / OpenAPI-version pills. */
          a[href="https://www.scalar.com"] {
            display: none !important;
          }
          .badges {
            display: none !important;
          }
        `,
      });
    </script>
  </body>
</html>
