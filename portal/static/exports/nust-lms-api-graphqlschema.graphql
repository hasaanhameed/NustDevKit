type Query {
    _: Boolean
}

type Mutation {
    "Authenticates against NUST LMS on your behalf and returns a gateway JWT. The LMS session (cookie + sesskey) is created and held server-side; use the returned token as `Authorization: Bearer <token>` for every other operation."
    createLogin(input: CreateLoginInput!): TokenResponse!
    "Returns the courses the authenticated user has accessed most recently, ordered by last access time.\nMoodle method: `core_course_get_recent_courses`"
    createGetcorerecentcourses(input: CreateGetcorerecentcoursesInput!): [RecentCourse!]
    "Returns all courses the user is enrolled in, filtered by timeline classification and sorted by a chosen field. Supports pagination via offset.\nMoodle method: `core_course_get_enrolled_courses_by_timeline_classification`"
    createGetenrolledcoursesbytimeline(input: CreateGetenrolledcoursesbytimelineInput!): EnrolledCoursesResponse!
    "Returns action events across all enrolled courses, ordered by their sort timestamp. Use `timesortfrom` to filter to upcoming events only.\nMoodle method: `core_calendar_get_action_events_by_timesort`"
    createGetcalendareventsbytimesort(input: CreateGetcalendareventsbytimesortInput!): CalendarEventsResponse!
    "Returns all action events (assignments, quizzes, etc.) for a single course.\nMoodle method: `core_calendar_get_action_events_by_course`"
    createGetcalendareventsbycourse(input: CreateGetcalendareventsbycourseInput!): CalendarEventsResponse!
    "Retrieves one or more user profiles by matching a specific profile field. Commonly used to look up the authenticated user's own profile by their ID.\nMoodle method: `core_user_get_users_by_field`"
    createGetusersbyfield(input: CreateGetusersbyfieldInput!): [UserProfile!]
    "Returns all stored preference key/value pairs for the specified user. Optionally filter to a single preference by name.\nMoodle method: `core_user_get_user_preferences`"
    createGetuserpreferences(input: CreateGetuserpreferencesInput!): UserPreferencesResponse!
    "Returns pending site-level notifications for the given Moodle context. Returns an empty array when there are no pending notifications.\nMoodle method: `core_fetch_notifications`"
    createFetchnotifications(input: CreateFetchnotificationsInput!): [SiteNotification!]
    "Returns the most recent popup notifications sent to a user, with support for pagination. Also returns the total count of unread notifications.\nMoodle method: `message_popup_get_popup_notifications`"
    createGetpopupnotifications(input: CreateGetpopupnotificationsInput!): PopupNotificationsResponse!
}

schema {
    mutation: Mutation
    query: Query
}
