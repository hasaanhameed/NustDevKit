    text: >-
      {
        "contextid": 1583361
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_41630fe3f4a540deab4b91419908e884
  parentId: fld_cf0795ba9db74c1bb987164e7a191aae
  description: >
    Returns pending site-level notifications for the given Moodle context. Returns an empty array when there are no pending notifications.

    Moodle method: `core_fetch_notifications`
- name: getPopupNotifications
