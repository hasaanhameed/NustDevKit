- name: login
  method: POST
  url: '{{default}}/auth/login'
  body:
    mimeType: application/json
    text: >-
      {
        "email": "john.doe@student.nust.edu.pk",
        "password": "password92"
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_59ca3963cf0c4cceaec491c93104a293
  parentId: fld_7f604c7af6c64f73a5d4112f4828b8c1
  description: >
    Authenticates against NUST LMS on your behalf and returns a gateway JWT. The LMS session (cookie + sesskey) is created and held server-side; use the returned token as `Authorization: Bearer <token>` for every other operation.
- name: getCoreRecentCourses
  method: POST
  url: '{{default}}/service/core_course_get_recent_courses'
  body:
    mimeType: application/json
    text: >-
      {
        "limit": 10
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_7e77e0fdb0c44d05b92a0c05fa7e5f8c
  parentId: fld_9e5cf79d326f4b70b89a7fc1035e0342
  description: >
    Returns the courses the authenticated user has accessed most recently, ordered by last access time.

    Moodle method: `core_course_get_recent_courses`
- name: getEnrolledCoursesByTimeline
  method: POST
  url: '{{default}}/service/core_course_get_enrolled_courses_by_timeline_classification'
  body:
    mimeType: application/json
    text: >-
      {
        "offset": 0,
        "limit": 50,
        "classification": "future",
        "sort": "shortname"
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_c7285f4e434f48f4a55e2148ac70cc7b
  parentId: fld_9e5cf79d326f4b70b89a7fc1035e0342
  description: >
    Returns all courses the user is enrolled in, filtered by timeline classification and sorted by a chosen field. Supports pagination via offset.

    Moodle method: `core_course_get_enrolled_courses_by_timeline_classification`
- name: getCalendarEventsByTimesort
