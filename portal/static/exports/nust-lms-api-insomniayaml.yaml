resources:
- name: NUST LMS API
  _type: workspace
  _id: wrk_77854d50a51c4fb493d4815a6b54ca1c
  description: >
    NUST Learning Management System API for developer integrations (Moodle AJAX wrapper).

    Authenticate with your NUST LMS credentials via `POST /auth/login` to receive a bearer token, then call any operation with `Authorization: Bearer <token>`. The NustDevKit gateway logs into the LMS on your behalf and manages the underlying session (cookie + sesskey) server-side, so you never handle the ephemeral sesskey.
- name: Authentication
  _type: request_group
  _id: fld_40ba945f2ebd464eb0cc3f103ee21652
  parentId: wrk_77854d50a51c4fb493d4815a6b54ca1c
  description: Exchange NUST LMS credentials for a gateway bearer token
- name: Courses
  _type: request_group
  _id: fld_147722a3113749a1836a9c241f5f7560
  parentId: wrk_77854d50a51c4fb493d4815a6b54ca1c
  description: Course listing and enrollment operations
- name: Calendar
  _type: request_group
  _id: fld_0fb9452c55c94db186b12d7d00377d4b
  parentId: wrk_77854d50a51c4fb493d4815a6b54ca1c
  description: >
    Calendar operations. On NUST LMS, these "action events" are how deadlines are surfaced — assignment, lab, quiz, and other submission due dates each appear as a calendar event on the day the work must be submitted.
- name: Account
  _type: request_group
  _id: fld_678cff31c1a846cca892660a0b389cec
  parentId: wrk_77854d50a51c4fb493d4815a6b54ca1c
  description: Your identity and account/site information
- name: Notifications
  _type: request_group
  _id: fld_d99d4898a9b449798ddddbe77ec23e2c
  parentId: wrk_77854d50a51c4fb493d4815a6b54ca1c
  description: Notification retrieval operations
- name: login
  method: POST
  url: http://127.0.0.1:8000/auth/login
  body:
    mimeType: application/json
    text: >-
      {
        "username": "johndoe.bscs23seecs",
        "password": "password67"
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_ebd28af41fa1442a9201c77d1074697a
  parentId: fld_40ba945f2ebd464eb0cc3f103ee21652
  description: >
    Authenticates against NUST LMS on your behalf and returns a gateway JWT. The LMS session (cookie + sesskey) is created and held server-side; use the returned token as `Authorization: Bearer <token>` for every other operation.
- name: getCoreRecentCourses
  method: GET
  url: http://127.0.0.1:8000/service/core_course_get_recent_courses
  parameters:
  - name: limit
    value: '10'
    disabled: false
  authentication: {}
  _type: request
  _id: req_4221ec3a354f412ba1b7cce3680a525e
  parentId: fld_147722a3113749a1836a9c241f5f7560
  description: >
    Returns the courses the authenticated user has accessed most recently, ordered by last access time.

    Moodle method: `core_course_get_recent_courses`
- name: getEnrolledCoursesByTimeline
  method: GET
  url: http://127.0.0.1:8000/service/core_course_get_enrolled_courses_by_timeline_classification
  parameters:
  - name: offset
    value: '0'
    disabled: false
  - name: limit
    value: '50'
    disabled: false
  - name: classification
    value: past
    disabled: false
  - name: sort
    value: fullname
    disabled: false
  authentication: {}
  _type: request
  _id: req_e4bdbfd1c25f450b9228e347e640aa61
  parentId: fld_147722a3113749a1836a9c241f5f7560
  description: >
    Returns all courses the user is enrolled in, filtered by timeline classification and sorted by a chosen field. Supports pagination via offset.

    Moodle method: `core_course_get_enrolled_courses_by_timeline_classification`
- name: getCourseContents
  method: GET
  url: http://127.0.0.1:8000/service/core_course_get_contents
  parameters:
  - name: courseid
    value: '38'
    disabled: false
  authentication: {}
  _type: request
  _id: req_b6c23aa11e36438ba461725dc3b43f59
  parentId: fld_147722a3113749a1836a9c241f5f7560
  description: >
    Returns the full content structure of a course — its sections (weeks/topics) and the modules within them (files, folders, pages, URLs, assignments, and other activities), including metadata for each uploaded file. This is the data the course page itself is built from.

    Note: file URLs point at Moodle's `pluginfile.php` and require authentication (a webservice token or the active session) to download — the URL alone is not publicly fetchable.

    Moodle method: `core_course_get_contents`
- name: getCalendarEventsByTimesort
  method: GET
  url: http://127.0.0.1:8000/service/core_calendar_get_action_events_by_timesort
  parameters:
  - name: limitnum
    value: '20'
    disabled: false
  - name: timesortfrom
    value: '0'
    disabled: false
  - name: timesortto
    value: '92'
    disabled: false
  - name: aftereventid
    value: '196'
    disabled: false
  authentication: {}
  _type: request
  _id: req_580236f58a9f497091abdfadcfa2ac76
  parentId: fld_0fb9452c55c94db186b12d7d00377d4b
  description: >
    Returns action events (deadlines) across all enrolled courses, ordered by their sort timestamp. On NUST LMS these are submission due dates for assignments, labs, quizzes, and similar dated activities. Use `timesortfrom` to filter to upcoming deadlines only.

    Moodle method: `core_calendar_get_action_events_by_timesort`
