      {
        "useridto": "123456",
        "limit": 20,
        "offset": 0
      }
  headers:
  - name: Content-Type
    value: application/json
    disabled: false
  authentication: {}
  _type: request
  _id: req_7964c28637e14c8eaef42756e198b1f4
  parentId: fld_cf0795ba9db74c1bb987164e7a191aae
  description: >
    Returns the most recent popup notifications sent to a user, with support for pagination. Also returns the total count of unread notifications.

