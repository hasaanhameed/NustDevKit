name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "ndk_backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -f ndk_backend/docker/Dockerfile -t $ECR_REGISTRY/nustdevkit:$IMAGE_TAG ndk_backend/
          docker push $ECR_REGISTRY/nustdevkit:$IMAGE_TAG

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 014548221504.dkr.ecr.ap-south-1.amazonaws.com
            docker pull 014548221504.dkr.ecr.ap-south-1.amazonaws.com/nustdevkit:latest
            docker stop nustdevkit || true
            docker rm nustdevkit || true
            docker run -d \
              --name nustdevkit \
              --restart unless-stopped \
              -p 8000:8000 \
              -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}" \
              014548221504.dkr.ecr.ap-south-1.amazonaws.com/nustdevkit:latest
